name: Run tests

on:
  workflow_dispatch:

jobs:
  automation-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Tests
        run: ./gradlew clean test -Dheadless=true --no-configuration-cache

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport --no-configuration-cache

      - name: Archive Allure Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            app/build/allure-results
            app/build/reports/allure-report
          retention-days: 2